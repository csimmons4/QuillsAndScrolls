<!doctype html>
<html lang="en" data-theme="parchment">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quills &amp; Scrolls — D&amp;D 5e Character App</title>
    <script>
      // Apply the saved theme before first paint to avoid a flash of the default.
      try {
        var t = localStorage.getItem('qs:theme');
        document.documentElement.setAttribute('data-theme',
          (t === 'light' || t === 'dark' || t === 'parchment') ? t : 'parchment');
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
